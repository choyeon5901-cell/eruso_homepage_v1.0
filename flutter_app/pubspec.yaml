name: eruso_app
description: 이루소 AI DDS - 드론 약배송 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # HTTP 통신
  http: ^1.1.0
  dio: ^5.4.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # 지도
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # 푸시 알림
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.6
  flutter_local_notifications: ^16.2.0
  
  # 로컬 저장소
  shared_preferences: ^2.2.2
  
  # 상태 관리
  provider: ^6.1.1
  
  # UI 컴포넌트
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # 유틸리티
  intl: ^0.18.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
